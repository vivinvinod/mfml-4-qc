name: Build and Deploy Documentation

# triggers every time you push to the main branch
on:
  push:
    branches:
      - main

# Grants permissions needed to push the built HTML files to a new branch
permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the package and the [dev] dependencies required for Sphinx
          pip install -e .[dev]

      - name: Build Sphinx Documentation
        run: |
          cd docs
          # Build the HTML pages (this will also execute the gallery examples)
          make html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html
          # This forces the bot to commit the HTML files to a separate branch 
          # named 'gh-pages', keeping main branch clean
          force_orphan: true
